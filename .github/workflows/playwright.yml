name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      # Use setup to install both root and terminal-server dependencies
      run: npm run setup
    - name: Install Redis
      # redis-server is required for the bare-metal "npm run dev" command
      run: sudo apt-get update && sudo apt-get install -y redis-server
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
      env:
        # Provide dummy environment variables so NextAuth doesn't crash the server on boot
        GITHUB_ID: test_dummy_id
        GITHUB_SECRET: test_dummy_secret
        NEXTAUTH_SECRET: test_dummy_secret
        NEXTAUTH_URL: http://localhost:3000
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

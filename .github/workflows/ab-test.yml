name: Sequential A/B Performance Test

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: 'Target Repository (e.g., owner/repo)'
        required: true
      baseline_branch:
        description: 'Baseline branch (Branch A)'
        required: true
        default: 'main'
      candidate_branch:
        description: 'Candidate branch (Branch B)'
        required: true
      seek_api_url:
        description: 'Seek Dashboard API URL (e.g., https://your-domain.com)'
        required: true
      test_url:
        description: 'The URL to test (e.g., http://localhost:3000)'
        required: true
        default: 'http://localhost:3000'
      start_command:
        description: 'Command to start the server (e.g. npm start)'
        required: true
        default: 'serve dist -p 3000'
      build_command:
        description: 'Command to build the server (e.g. npm run build)'
        required: false
        default: 'npm install --legacy-peer-deps && npm run build --if-present && npm install -g serve'

jobs:
  ab-performance-test:
    runs-on: ubuntu-latest
    
    # 1. Spin up a local MongoDB container for MERN backends to connect to
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    steps:
      - name: System Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          npm install -g autocannon wait-on kill-port

      # ================== BASELINE (BRANCH A) ==================
      - name: Checkout Baseline Branch (A)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.target_repo }}
          ref: ${{ github.event.inputs.baseline_branch }}
          path: baseline

      - name: Setup Node for Baseline
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Baseline
        working-directory: ./baseline
        run: |
          if [ -d "server" ] && [ -d "client" ]; then
            echo "==> MERN Stack Detected (server/client) <=="
            (cd server && npm install --legacy-peer-deps)
            (cd client && npm install --legacy-peer-deps && npm run build --if-present)
          elif [ -d "backend" ] && [ -d "frontend" ]; then
            echo "==> MERN Stack Detected (backend/frontend) <=="
            (cd backend && npm install --legacy-peer-deps)
            (cd frontend && npm install --legacy-peer-deps && npm run build --if-present)
          else
            echo "==> Single-Process App Detected <=="
            ${{ github.event.inputs.build_command }}
          fi

      - name: Start Baseline Server
        working-directory: ./baseline
        run: |
          if [ -d "server" ] && [ -d "client" ]; then
            npx kill-port 3000 5000 5173 || true
            (cd server && export PORT=5000 MONGO_URI="mongodb://127.0.0.1:27017/test" MONGODB_URI="mongodb://127.0.0.1:27017/test" && npm start) &
            (cd client && export PORT=3000 && (npm run dev || npm start || echo "Frontend boot fallback")) &
            wait-on http://localhost:5000 -t 90000
            echo "TARGET_TEST_URL=http://localhost:5000" >> $GITHUB_ENV
            echo "TARGET_PORTS=3000 5000 5173" >> $GITHUB_ENV
          elif [ -d "backend" ] && [ -d "frontend" ]; then
            npx kill-port 3000 5000 5173 || true
            (cd backend && export PORT=5000 MONGO_URI="mongodb://127.0.0.1:27017/test" MONGODB_URI="mongodb://127.0.0.1:27017/test" && npm start) &
            (cd frontend && export PORT=3000 && (npm run dev || npm start || echo "Frontend boot fallback")) &
            wait-on http://localhost:5000 -t 90000
            echo "TARGET_TEST_URL=http://localhost:5000" >> $GITHUB_ENV
            echo "TARGET_PORTS=3000 5000 5173" >> $GITHUB_ENV
          else
            TEST_PORT=$(echo "${{ github.event.inputs.test_url }}" | sed -E 's#.*:([0-9]+).*#\1#')
            npx kill-port "$TEST_PORT" || true
            ${{ github.event.inputs.start_command }} &
            wait-on ${{ github.event.inputs.test_url }} -t 60000
            echo "TARGET_TEST_URL=${{ github.event.inputs.test_url }}" >> $GITHUB_ENV
            echo "TARGET_PORTS=$TEST_PORT" >> $GITHUB_ENV
          fi

      - name: Load Test Baseline (A)
        run: |
          echo "Running warm-up on $TARGET_TEST_URL..."
          autocannon -c 10 -d 5 $TARGET_TEST_URL
          echo "Running Baseline Load Test..."
          autocannon -c 100 -d 30 -j $TARGET_TEST_URL > baseline-results.json
        
      - name: Stop Baseline Server
        run: npx kill-port $TARGET_PORTS || true

      # ================== CANDIDATE (BRANCH B) ==================
      - name: Checkout Candidate Branch (B)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.inputs.target_repo }}
          ref: ${{ github.event.inputs.candidate_branch }}
          path: candidate

      - name: Build Candidate
        working-directory: ./candidate
        run: |
          if [ -d "server" ] && [ -d "client" ]; then
            echo "==> MERN Stack Detected (server/client) <=="
            (cd server && npm install --legacy-peer-deps)
            (cd client && npm install --legacy-peer-deps && npm run build --if-present)
          elif [ -d "backend" ] && [ -d "frontend" ]; then
            echo "==> MERN Stack Detected (backend/frontend) <=="
            (cd backend && npm install --legacy-peer-deps)
            (cd frontend && npm install --legacy-peer-deps && npm run build --if-present)
          else
            echo "==> Single-Process App Detected <=="
            ${{ github.event.inputs.build_command }}
          fi

      - name: Start Candidate Server
        working-directory: ./candidate
        run: |
          if [ -d "server" ] && [ -d "client" ]; then
            npx kill-port 3000 5000 5173 || true
            (cd server && export PORT=5000 MONGO_URI="mongodb://127.0.0.1:27017/test" MONGODB_URI="mongodb://127.0.0.1:27017/test" && npm start) &
            (cd client && export PORT=3000 && (npm run dev || npm start || echo "Frontend boot fallback")) &
            wait-on http://localhost:5000 -t 90000
            echo "TARGET_TEST_URL=http://localhost:5000" >> $GITHUB_ENV
            echo "TARGET_PORTS=3000 5000 5173" >> $GITHUB_ENV
          elif [ -d "backend" ] && [ -d "frontend" ]; then
            npx kill-port 3000 5000 5173 || true
            (cd backend && export PORT=5000 MONGO_URI="mongodb://127.0.0.1:27017/test" MONGODB_URI="mongodb://127.0.0.1:27017/test" && npm start) &
            (cd frontend && export PORT=3000 && (npm run dev || npm start || echo "Frontend boot fallback")) &
            wait-on http://localhost:5000 -t 90000
            echo "TARGET_TEST_URL=http://localhost:5000" >> $GITHUB_ENV
            echo "TARGET_PORTS=3000 5000 5173" >> $GITHUB_ENV
          else
            TEST_PORT=$(echo "${{ github.event.inputs.test_url }}" | sed -E 's#.*:([0-9]+).*#\1#')
            npx kill-port "$TEST_PORT" || true
            ${{ github.event.inputs.start_command }} &
            wait-on ${{ github.event.inputs.test_url }} -t 60000
            echo "TARGET_TEST_URL=${{ github.event.inputs.test_url }}" >> $GITHUB_ENV
            echo "TARGET_PORTS=$TEST_PORT" >> $GITHUB_ENV
          fi

      - name: Load Test Candidate (B)
        run: |
          echo "Running warm-up on $TARGET_TEST_URL..."
          autocannon -c 10 -d 5 $TARGET_TEST_URL
          echo "Running Candidate Load Test..."
          autocannon -c 100 -d 30 -j $TARGET_TEST_URL > candidate-results.json
        
      - name: Stop Candidate Server
        run: npx kill-port $TARGET_PORTS || true

      # ================== EVALUATION ==================
      - name: Checkout Evaluation Script
        uses: actions/checkout@v4
        with:
          repository: 'ojaswi1234/drift_seek'
          path: tools

      - name: Evaluate A/B Test Gates
        env:
          SEEK_API_TOKEN: ${{ secrets.SEEK_API_TOKEN }}
        run: node tools/scripts/ab-platform/evaluate.js ./baseline-results.json ./candidate-results.json "${{ github.event.inputs.seek_api_url }}/api/abtest/results" "https://github.com/${{ github.event.inputs.target_repo }}" "${{ github.event.inputs.baseline_branch }}" "${{ github.event.inputs.candidate_branch }}"
name: Auto Sync Lockfile

on:
  push:
    paths:
      - 'package.json'
  pull_request:
    paths:
      - 'package.json'
  workflow_dispatch:

jobs:
  lockfile-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies and update lockfile
        run: npm install

      - name: Commit and push lockfile
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: sync package-lock.json with package.json"
          file_pattern: package-lock.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}